<section class="dashboard-page">
  <header class="dashboard-intro">
    <p class="eyebrow">Finance Command Center</p>
    <h1>Dashboard</h1>
    <p>Manage summary insights, transactions, recurring schedules, and reports in one responsive workspace.</p>
  </header>

  <mat-card class="dashboard-card" appearance="outlined">
    <mat-card-content>
      <mat-tab-group animationDuration="250ms" dynamicHeight>
        <mat-tab label="Summary">
          <app-summary-tab></app-summary-tab>
        </mat-tab>
        <mat-tab label="Transactions">
          <app-transactions-tab></app-transactions-tab>
        </mat-tab>
        <mat-tab label="Recurring">
          <app-recurring-tab></app-recurring-tab>
        </mat-tab>
        <mat-tab label="Reports">
          <app-reports-tab></app-reports-tab>
        </mat-tab>
      </mat-tab-group>
    </mat-card-content>
  </mat-card>
</section>
