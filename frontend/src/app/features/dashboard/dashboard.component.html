<section class="dashboard-page">
  <mat-card class="dashboard-card" appearance="outlined">
    <mat-card-header>
      <mat-card-title>Dashboard</mat-card-title>
      <mat-card-subtitle>Current status for your protected finance summary</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      @if (isLoading) {
        <div class="loading-state">
          <mat-spinner [diameter]="32"></mat-spinner>
          <p>Loading dashboard data...</p>
        </div>
      } @else {
        <p>{{ message }}</p>
        @if (generatedAtUtc) {
          <p class="timestamp">Generated at (UTC): {{ generatedAtUtc }}</p>
        }
      }
    </mat-card-content>
  </mat-card>
</section>
